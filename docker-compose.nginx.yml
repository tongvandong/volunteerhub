# VolunteerHub on a VPS where nginx + Certbot owns ports 80/443.
#
# Usage:
#   docker compose -f docker-compose.nginx.yml --env-file .env build
#   docker compose -f docker-compose.nginx.yml --env-file .env up -d
#
# Public traffic:
#   nginx :80/:443 -> http://127.0.0.1:8080 -> web container -> /api gateway, /hubs eventservice

name: volunteerhub

x-dotnet-env: &dotnet-env
  ASPNETCORE_ENVIRONMENT: Production
  ConnectionStrings__ConnectedDb: "Server=sqlserver,1433;Database=VolunteerHub;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true;Encrypt=false;MultipleActiveResultSets=true"
  Jwt__SecretKey: ${JWT_SECRET}
  Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
  Frontend__BaseUrl: ${PUBLIC_URL}
  Smtp__Host: ${SMTP_HOST:-}
  Smtp__Port: ${SMTP_PORT:-587}
  Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}
  Smtp__Username: ${SMTP_USERNAME:-}
  Smtp__Password: ${SMTP_PASSWORD:-}
  Smtp__FromEmail: ${SMTP_FROM_EMAIL:-}
  Smtp__FromName: ${SMTP_FROM_NAME:-VolunteerHub}

x-dotnet-healthcheck: &dotnet-healthcheck
  test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 60s

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    networks: [volunteerhub]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks: [volunteerhub]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      HC_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$$HC_PASSWORD\" 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s
    restart: unless-stopped
    networks: [volunteerhub]

  authservice:
    build:
      context: .
      dockerfile: deploy/dotnet-service.Dockerfile
      args: { PROJECT: BaseCore.AuthService/BaseCore.AuthService.csproj, DLL: BaseCore.AuthService.dll }
    environment:
      <<: *dotnet-env
    volumes:
      - uploads_data:/app/wwwroot/uploads
    depends_on:
      sqlserver: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck: *dotnet-healthcheck
    restart: unless-stopped
    networks: [volunteerhub]

  eventservice:
    build:
      context: .
      dockerfile: deploy/dotnet-service.Dockerfile
      args: { PROJECT: BaseCore.EventService/BaseCore.EventService.csproj, DLL: BaseCore.EventService.dll }
    environment:
      <<: *dotnet-env
      Cors__AllowedOrigins: ${PUBLIC_URL}
      Neo4j__Uri: bolt://neo4j:7687
      Neo4j__User: neo4j
      Neo4j__Password: ${NEO4J_PASSWORD}
      Graph__SyncIntervalMinutes: 20
      Demo__SeedEnabled: ${DEMO_SEED_ENABLED:-false}
    volumes:
      - certificates_data:/app/wwwroot/certificates
    depends_on:
      authservice: { condition: service_healthy }
      neo4j: { condition: service_healthy }
    healthcheck: *dotnet-healthcheck
    restart: unless-stopped
    networks: [volunteerhub]

  financeservice:
    build:
      context: .
      dockerfile: deploy/dotnet-service.Dockerfile
      args: { PROJECT: BaseCore.FinanceService/BaseCore.FinanceService.csproj, DLL: BaseCore.FinanceService.dll }
    environment:
      <<: *dotnet-env
    depends_on:
      eventservice: { condition: service_healthy }
    healthcheck: *dotnet-healthcheck
    restart: unless-stopped
    networks: [volunteerhub]

  gateway:
    build:
      context: .
      dockerfile: deploy/dotnet-service.Dockerfile
      args: { PROJECT: BaseCore.ApiGateway/BaseCore.ApiGateway.csproj, DLL: BaseCore.ApiGateway.dll }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Ocelot__ConfigFile: ocelot.docker.json
    depends_on:
      authservice: { condition: service_healthy }
      eventservice: { condition: service_healthy }
      financeservice: { condition: service_healthy }
    healthcheck: *dotnet-healthcheck
    restart: unless-stopped
    networks: [volunteerhub]

  certificateworker:
    build:
      context: .
      dockerfile: deploy/certificateworker.Dockerfile
    environment:
      DATABASE_URL: "Server=sqlserver,1433;Database=VolunteerHub;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true"
      CERTIFICATE_OUTPUT_DIR: /data/certificates
      CERTIFICATE_PUBLIC_BASE_URL: /certificates
      CERTIFICATE_VERIFY_BASE_URL: ${PUBLIC_URL}/verify
      RUST_LOG: info
    volumes:
      - certificates_data:/data/certificates
    depends_on:
      eventservice: { condition: service_healthy }
    restart: unless-stopped
    networks: [volunteerhub]

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
      args: { VITE_HUB_URL: /hubs/channel }
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      gateway: { condition: service_healthy }
      eventservice: { condition: service_healthy }
    restart: unless-stopped
    networks: [volunteerhub]

networks:
  volunteerhub:
    driver: bridge

volumes:
  mssql_data:
  redis_data:
  neo4j_data:
  uploads_data:
  certificates_data:
